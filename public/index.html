<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/3fe6c23444.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
</head>
<body>
    <div class="bg-container">
      <div class="container">
            <div class="row">
                <div class="col-12">
                        <h1 class="heading">TODO LIST</h1>
                        <h1><span class="inputHead">Create</span> a task</h1>
                        <div class="input-container">
                            <input type="text" id="inputId" placeholder="Enter a task"/>
                            <button onclick="startVoice()" class="mic-btn">
                                🎤
                            </button>
                            <button class="btn btn-primary" id="addBtn" onclick="createTask()">ADD</button>
                        </div>
                        <br/>
                        
                        <h1>My tasks: </h1>
                        <ul id="todoelements">
                        </ul>
                        <button class="btn btn-secondary d-flex flex-row justify-content-center" id="saveBtn">SAVE</button>
                </div>
            </div>
      </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
